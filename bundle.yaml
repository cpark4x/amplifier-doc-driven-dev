bundle:
  name: doc-driven-dev
  version: 1.0.0
  description: Doc-driven development — skills, context, and session workflow for documentation-first projects

includes:
  - bundle: git+https://github.com/microsoft/amplifier-foundation@main

tools:
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-module-tool-skills@main
    config:
      skills_dirs:
        - ./skills
      skills:
        - "git+https://github.com/cpark4x/amplifier-doc-driven-dev@main#subdirectory=skills"
      visibility:
        enabled: true
        max_skills_visible: 50

context:
  include:
    - doc-driven-dev:context/session-close-reminder.md
