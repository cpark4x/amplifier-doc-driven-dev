# Doc-Driven Development Setup Recipe
# ====================================
#
# Author: Chris Park
#
# Sets up the four-document alignment system for any project state:
#
#   Greenfield    -- no docs, no code (or minimal code)
#   Undocumented  -- existing codebase, no alignment docs
#   Stale         -- alignment docs exist but have drifted from reality
#
# Creates or updates:
#   VISION.md   -- what we're building, why, for whom, principles
#   OUTCOMES.md -- measurable results we're driving toward
#   BACKLOG.md  -- what's built, what's next, tied to outcomes
#   AGENTS.md   -- project context for AI sessions ("read me first")
#
# Templates are referenced via @doc-driven-dev:templates/ -- no hardcoded paths.
#
# USAGE
# -----
# In a session:
#   "run doc-driven-setup"
#
# With context:
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=@doc-driven-dev:recipes/doc-driven-setup.yaml \
#     context='{"project_path": "/path/to/project", "project_description": "A CLI tool that..."}'
#
# For greenfield projects, provide project_description with your concept.
# For undocumented/stale projects, it's optional -- the recipe reads the codebase.
#
# =============================================================================

name: "doc-driven-setup"
description: "Set up the four-document alignment system (VISION, OUTCOMES, BACKLOG, AGENTS) for any project -- greenfield, undocumented, or stale"
version: "2.0.0"
author: "Chris Park"
tags: ["documentation", "setup", "bootstrap", "project-init", "doc-driven", "alignment"]

context:
  project_path: ""
  project_description: ""

stages:
  # ==========================================================================
  # STAGE 1: DISCOVERY
  # Detect project state, read existing docs and code if present
  # ==========================================================================
  - name: "discovery"
    steps:
      - id: "detect-project-state"
        agent: "foundation:explorer"
        prompt: |
          You are detecting the state of a project to set up the doc-driven-dev
          alignment system.

          ## Project Path

          {% if project_path %}
          Project path: {{project_path}}
          {% else %}
          No project path was provided. Use the current working directory.
          {% endif %}

          ## Your Task

          1. **Check for existing alignment docs** at the project root:
             - VISION.md
             - OUTCOMES.md
             - BACKLOG.md
             - AGENTS.md

          2. **Check for existing code/content**:
             - Look at the top-level directory structure
             - Check for README.md, package.json, pyproject.toml, Cargo.toml,
               or other project manifests
             - Note the primary language/framework if detectable

          3. **Classify the project state**:

             | State | Criteria |
             |-------|----------|
             | **Greenfield** | No alignment docs AND no meaningful code/content |
             | **Undocumented** | No alignment docs (or only partial) BUT existing code/content |
             | **Stale** | Alignment docs exist BUT `last_updated` is >2 weeks old OR docs don't reflect current codebase |

          4. **If Undocumented or Stale**, also gather:
             - What the project appears to do (from README, manifests, code structure)
             - Key directories and their apparent purpose
             - Any existing documentation (README, docs/, etc.)
             - If Stale: what specifically has drifted (compare doc claims to current state)

          ## Output

          Provide a structured summary:

          ```
          PROJECT STATE ASSESSMENT
          ========================
          Path: [confirmed path]
          State: [Greenfield / Undocumented / Stale]

          Existing alignment docs:
          - VISION.md: [exists/missing] [if exists: last_updated date]
          - OUTCOMES.md: [exists/missing] [if exists: last_updated date]
          - BACKLOG.md: [exists/missing] [if exists: last_updated date]
          - AGENTS.md: [exists/missing] [if exists: last_updated date]

          Project overview:
          - Description: [what this project appears to do, or "empty project"]
          - Primary language/framework: [if detectable]
          - Key directories: [list with purposes]

          Drift notes (if Stale):
          - [specific observations about what has drifted]

          Recommended approach:
          - [Create all 4 docs from scratch / Create missing docs + update existing / Update all docs to reflect current state]
          ```
        output: "project_assessment"
        timeout: 120

  # ==========================================================================
  # STAGE 2: VISION
  # Interview user about what they're building -- or validate existing VISION.md
  # ==========================================================================
  - name: "vision"
    approval:
      required: true
      prompt: |
        DISCOVERY COMPLETE

        {{project_assessment}}

        Ready to proceed to Vision definition.
        Approve to continue. Deny to revise the assessment.
    steps:
      - id: "define-vision"
        agent: "foundation:zen-architect"
        prompt: |
          You are helping define (or validate) the project vision for the
          doc-driven-dev alignment system.

          ## Context

          {{project_assessment}}

          {% if project_description %}
          ## Project Description

          {{project_description}}
          {% endif %}

          ## Templates

          Read the VISION template for the expected structure:
          @doc-driven-dev:templates/VISION_TEMPLATE.md

          ## Your Task

          {% if "Greenfield" in project_assessment %}
          **Greenfield project.** Use the project description above to draft the vision.
          Extract or infer:

          1. What they're building (1-2 sentences)
          2. What specific pain this solves and who feels it
          3. What they're explicitly NOT building (non-goals -- critical for AI alignment)
          4. What principles should guide every decision ("We value X over Y")

          If the user's input is missing any of these, make reasonable inferences
          from what they provided and note your assumptions in the output.
          {% elif "Undocumented" in project_assessment %}
          **Undocumented project.** Based on what Discovery found in the codebase,
          draft a vision. If the user provided additional context above, incorporate it.

          1. Draft your best understanding of what this project does and why
          2. Infer non-goals and principles from code patterns and any user input
          3. Note any assumptions for user review at the next approval gate
          {% else %}
          **Stale project.** Read the existing VISION.md and validate:

          1. Does the Summary still accurately describe what's being built?
          2. Do the Non-Goals still hold, or has scope shifted?
          3. Do the Principles still reflect how work is done?
          4. Note any drift observations from Discovery for user review
          {% endif %}

          ## Output

          Write VISION.md to the project root using the
          template structure. Use today's date (format: YYYY-MM-DD) in frontmatter.

          Then provide a summary of what was written:

          ```
          VISION DEFINED
          ==============
          Summary: [the 2-3 sentence summary from VISION.md]
          Non-Goals: [list]
          Principles: [list]
          Status: [Created / Updated]
          ```
        output: "vision_result"
        timeout: 600

  # ==========================================================================
  # STAGE 3: OUTCOMES + BACKLOG
  # Define measurable outcomes and initial backlog -- or update existing
  # ==========================================================================
  - name: "outcomes-and-backlog"
    approval:
      required: true
      prompt: |
        VISION COMPLETE

        {{vision_result}}

        Ready to define outcomes and initial backlog.
        Approve to continue. Deny to revise the vision.
    steps:
      - id: "define-outcomes-and-backlog"
        agent: "foundation:zen-architect"
        prompt: |
          You are helping define (or update) measurable outcomes and the initial
          backlog for the doc-driven-dev alignment system.

          ## Context

          {{project_assessment}}

          {{vision_result}}

          {% if project_description %}
          ## Project Description

          {{project_description}}
          {% endif %}

          ## Templates

          Read the templates for the expected structure:
          @doc-driven-dev:templates/OUTCOMES_TEMPLATE.md
          @doc-driven-dev:templates/BACKLOG_TEMPLATE.md

          ## Your Task

          ### Outcomes

          {% if "Greenfield" in project_assessment %}
          Define 2-4 measurable outcomes based on the vision:

          - Each outcome must connect to the vision ("Why It Matters")
          - Each must have a concrete measurement or signal ("How We Measure")
          - Don't force metrics where signals are more honest (e.g., "users report less confusion" is fine)
          {% elif "Undocumented" in project_assessment %}
          Based on the codebase and vision, propose outcomes and confirm:

          - What would "success" look like for this project?
          - What signals would tell you it's working?
          {% else %}
          Validate existing OUTCOMES.md against current reality:

          - Are the outcomes still the right ones?
          - Are the statuses accurate?
          - Should any outcomes be retired or added?
          {% endif %}

          ### Backlog

          {% if "Greenfield" in project_assessment %}
          Create an initial backlog:

          - Every item must trace to an outcome ("Drives Outcome")
          - Start with 3-5 items in Active or Up Next
          - Done section starts empty
          {% elif "Undocumented" in project_assessment %}
          Build backlog from what exists:

          - What's already built goes in Done (with "Driven By" attribution)
          - What's in progress goes in Active
          - What's next goes in Up Next
          - Every item traces to an outcome
          {% else %}
          Update existing BACKLOG.md:

          - Move completed items to Done
          - Add missing items discovered from the codebase
          - Verify every item traces to a current outcome
          {% endif %}

          ## Output

          Write both files to the project root using the template structures.
          Use today's date in frontmatter.

          Then provide a summary:

          ```
          OUTCOMES + BACKLOG DEFINED
          =========================
          Outcomes: [count] defined
          - [Outcome 1]: [Status]
          - [Outcome 2]: [Status]

          Backlog:
          - Active: [count] items
          - Up Next: [count] items
          - Done: [count] items

          Status: [Created / Updated]
          ```
        output: "outcomes_backlog_result"
        timeout: 600

  # ==========================================================================
  # STAGE 4: PROJECT CONTEXT
  # Create AGENTS.md -- the "read me first" file for AI sessions
  # ==========================================================================
  - name: "project-context"
    approval:
      required: true
      prompt: |
        OUTCOMES + BACKLOG COMPLETE

        {{outcomes_backlog_result}}

        Ready to create the project context file (AGENTS.md).
        Approve to continue. Deny to revise outcomes or backlog.
    steps:
      - id: "create-agents-md"
        agent: "foundation:zen-architect"
        prompt: |
          You are creating (or updating) AGENTS.md -- the static project context
          file that every AI session reads first.

          ## Context

          {{project_assessment}}

          {{vision_result}}

          {{outcomes_backlog_result}}

          ## Template

          Read the template for the expected structure:
          @doc-driven-dev:templates/AGENTS_TEMPLATE.md

          ## Your Task

          Write AGENTS.md to the project root. This file must:

          1. **What This Is** -- 1-2 sentences from the vision summary
          2. **Current Focus** -- pulled from the Active backlog items
          3. **Key Decisions** -- any significant decisions made during this setup
          4. **Project Structure** -- key directories and their purpose (from Discovery)
          5. **Docs** -- links to VISION.md, OUTCOMES.md, BACKLOG.md
          6. **How We Work** -- conventions for AI autonomy, human approval, uncertainty handling

          Use today's date in frontmatter.

          ## Output

          After writing the file, confirm:

          ```
          ALIGNMENT SYSTEM COMPLETE
          =========================

          Files at project root:
          - [x] VISION.md -- what we're building and why
          - [x] OUTCOMES.md -- measurable results and status
          - [x] BACKLOG.md -- what's built, what's next
          - [x] AGENTS.md -- project context for AI sessions

          Next steps:
          1. Review VISION.md non-goals -- these are your AI's guardrails
          2. Run "health check" after your next PR to keep docs current
          3. At session start, read AGENTS.md for full project context
          ```
        output: "setup_complete"
        timeout: 600

# ==========================================================================
# EXPECTED OUTPUTS
# ==========================================================================
#
# After full execution:
# - project_assessment: Project state detection and codebase overview
# - vision_result: Vision definition or validation summary
# - outcomes_backlog_result: Outcomes and backlog definition or update summary
# - setup_complete: Final confirmation with file list and next steps
#
# Files created/updated (all at project root):
# - VISION.md    -- problem, solution, non-goals, audience, principles
# - OUTCOMES.md  -- measurable outcomes table with status tracking
# - BACKLOG.md   -- active / up-next / done work items tied to outcomes
# - AGENTS.md    -- project context, structure, conventions, doc links
