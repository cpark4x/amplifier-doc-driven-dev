# Doc-Driven Development Setup Recipe
# ====================================
#
# Author: Chris Park
# Source: workspaces2/docs/07-templates/recipes/
#
# Bootstraps documentation structure for new projects using the doc-driven
# development pattern used across workspaces2, murmur, and amplifier-session-insights.
#
# PHILOSOPHY
# ----------
# Documentation-driven development means:
# 1. Vision first - define problems before solutions
# 2. Epics describe WHAT (user-focused), not HOW (technical)
# 3. User stories only for IMPLEMENTED features (no speculative docs)
# 4. Principles guide controversial decisions
# 5. Structure scales with project complexity
#
# STRUCTURE TIERS
# ---------------
# - lean:     Small tools - 01-vision, 02-requirements/epics, templates/
# - standard: Medium projects - adds PRINCIPLES.md, SUCCESS-METRICS.md, user-stories/
# - full:     Large projects - adds 03-technical/, 04-guides/, 05-design/, 06-research/
#
# ALL TIERS include templates/ folder with document templates for consistency.
#
# USAGE
# -----
# In a session:
#   "run the doc-driven-setup recipe for my new project"
#
# With context:
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=doc-driven-setup.yaml \
#     context='{"project_path": "/path/to/project", "project_name": "MyProject"}'
#
# FAST MODE (NON-INTERACTIVE)
# ---------------------------
# This is the FAST variant - no approval gates, runs straight through.
# Use when:
# - You trust the recipe and just want docs bootstrapped quickly
# - Running in automation/CI
# - You've used the interactive version before and know what to expect
#
# For the interactive version with approval gates, use: doc-driven-setup.yaml
#
# REQUIRES: All context variables must be provided (no conversational gathering)

name: "doc-driven-setup-fast"
description: "Bootstrap documentation structure for new projects - FAST MODE (no approval gates)"
version: "1.0.0"
author: "Chris Park"
tags: ["documentation", "setup", "bootstrap", "project-init", "doc-driven"]

context:
  # Required inputs (can be gathered conversationally if empty)
  project_path: ""           # Where to create docs (e.g., /Users/chrispark/Projects/myproject)
  project_name: ""           # Name of the project
  project_description: ""    # One-sentence description
  
  # Optional inputs
  structure_tier: "lean"     # "lean", "standard", or "full" (default: lean)
  
  # Template source (from this toolkit)
  templates_path: "/Users/chrispark/Projects/toolkit/templates"

stages:
  # ==========================================================================
  # STAGE 1: PROJECT DISCOVERY
  # Gather project information through conversation
  # ==========================================================================
  - name: "discovery"
    steps:
      - id: "gather-project-info"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        prompt: |
          You are helping set up documentation for a new project using doc-driven development.
          
          ## Current Context
          
          - Project Path: {{project_path}}
          - Project Name: {{project_name}}
          - Project Description: {{project_description}}
          - Structure Tier: {{structure_tier}}
          
          ## Your Task
          
          {% if not project_path or not project_name %}
          **INFORMATION NEEDED**
          
          Some required information is missing. Have a brief conversation to gather:
          
          1. **Project Path** - Where should docs be created?
             - Ask: "Where is your project located? (full path)"
          
          2. **Project Name** - What's the project called?
             - Ask: "What's the project name?"
          
          3. **Project Description** - One sentence about what it does
             - Ask: "In one sentence, what does this project do?"
          
          4. **Structure Tier** - How complex is the project?
             - Explain the options:
               - **lean** (default): Small tools/scripts - minimal docs (vision, epics)
               - **standard**: Medium projects - adds principles, metrics, user-stories
               - **full**: Large projects - adds technical docs, guides, design specs
             - Ask: "Which tier fits your project? (lean/standard/full)"
          
          Gather this information naturally through conversation.
          
          {% else %}
          **INFORMATION COMPLETE**
          
          All required information is provided. Confirm the setup:
          
          - **Path:** {{project_path}}
          - **Name:** {{project_name}}
          - **Description:** {{project_description}}
          - **Tier:** {{structure_tier}}
          
          Validate:
          1. Does the path exist? Check with `ls -la {{project_path}}`
          2. Is there already a docs/ folder? Check for existing documentation.
          3. Is the tier appropriate for the description?
          
          {% endif %}
          
          ## Output
          
          Provide a structured summary:
          
          ```
          PROJECT SETUP SUMMARY
          =====================
          Path: [confirmed path]
          Name: [confirmed name]
          Description: [confirmed description]
          Tier: [confirmed tier]
          
          Directory Status:
          - Path exists: [yes/no]
          - Existing docs/: [yes/no - if yes, list what exists]
          
          Recommended Actions:
          - [What will be created]
          - [Any warnings about existing files]
          ```
        output: "project_summary"
        timeout: 300

  # ==========================================================================
  # STAGE 2: STRUCTURE CREATION
  # Create directory structure and copy templates
  # ==========================================================================
  - name: "structure"
    steps:
      - id: "create-directories"
        agent: "foundation:zen-architect"
        prompt: |
          Create the documentation directory structure for this project.
          
          ## Project Info
          - Path: {{project_path}}
          - Name: {{project_name}}
          - Tier: {{structure_tier}}
          - Templates: {{templates_path}}
          
          ## Directory Structure by Tier
          
          ### LEAN (small tools)
          ```
          docs/
            01-vision/
              VISION.md
            02-requirements/
              epics/
                README.md
            templates/
              VISION_TEMPLATE.md
              EPIC_TEMPLATE.md
              USER_STORY_TEMPLATE.md
          ```
          
          ### STANDARD (medium projects)
          ```
          docs/
            01-vision/
              VISION.md
              PRINCIPLES.md
              SUCCESS-METRICS.md
            02-requirements/
              epics/
                README.md
              user-stories/
                README.md
            templates/
              VISION_TEMPLATE.md
              EPIC_TEMPLATE.md
              USER_STORY_TEMPLATE.md
              PRINCIPLES_TEMPLATE.md
              SUCCESS_METRICS_TEMPLATE.md
          ```
          
          ### FULL (large projects)
          ```
          docs/
            01-vision/
              VISION.md
              PRINCIPLES.md
              SUCCESS-METRICS.md
            02-requirements/
              epics/
                README.md
              user-stories/
                README.md
            03-technical/
              dev-design/
                README.md
              architecture/
                README.md
            04-guides/
              README.md
            05-design/
              README.md
            06-research/
              README.md
            templates/
              (all templates from workspaces2)
          ```
          
          ## Tasks
          
          1. **Create directories** based on the tier
             ```bash
             mkdir -p {{project_path}}/docs/01-vision
             mkdir -p {{project_path}}/docs/02-requirements/epics
             # ... etc based on tier
             ```
          
          2. **Copy templates** from {{templates_path}} to docs/templates/
             ALL TIERS get these templates:
             - VISION_TEMPLATE.md
             - EPIC_TEMPLATE.md
             - USER_STORY_TEMPLATE.md
             
             STANDARD and FULL tiers also get:
             - PRINCIPLES_TEMPLATE.md
             - SUCCESS_METRICS_TEMPLATE.md
             
             Templates go in docs/templates/, not scattered across folders.
          
          3. **Create placeholder READMEs** for directories
          
          Execute the commands and report what was created.
          
          ## Output
          
          ```
          STRUCTURE CREATED
          =================
          
          Directories:
          - [x] docs/01-vision/
          - [x] docs/02-requirements/epics/
          - ... (list all created)
          
          Templates Copied:
          - [x] VISION.md (from VISION_TEMPLATE.md)
          - [x] EPIC_TEMPLATE.md
          - ... (list all copied)
          
          Ready for: Vision document generation
          ```
        output: "structure_created"
        timeout: 300

  # ==========================================================================
  # STAGE 3: VISION GENERATION
  # Conversational generation of VISION.md
  # ==========================================================================
  - name: "vision"
    steps:
      - id: "generate-vision"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        prompt: |
          Generate a VISION.md document for this project through conversation.
          
          ## Project Context
          - Name: {{project_name}}
          - Description: {{project_description}}
          - Path: {{project_path}}
          
          ## Vision Document Structure
          
          The vision document needs these sections:
          
          ### 1. The Problems We're Solving
          Ask about:
          - "What specific problems does {{project_name}} solve?"
          - "Who experiences these problems? How painful are they?"
          - "What happens if these problems aren't solved?"
          
          ### 2. Strategic Positioning
          Ask about:
          - "What alternatives exist? How do people solve this today?"
          - "What's your contrarian insight - why are existing solutions wrong?"
          - "What will {{project_name}} do differently?"
          
          ### 3. Target Audience
          Ask about:
          - "Who is the primary user? Be specific."
          - "Why are they underserved by existing solutions?"
          - "Is there a secondary audience?"
          
          ### 4. The Sequence (V1/V2/V3)
          Ask about:
          - "What's the V1 scope? What's the minimum that validates the idea?"
          - "What does V2 add once V1 is validated?"
          - "What's the long-term V3 vision?"
          
          ## Conversation Approach
          
          1. Start with the project description: "{{project_description}}"
          2. Ask 2-3 focused questions at a time
          3. Build up the vision iteratively
          4. Summarize what you've learned before moving to next section
          
          ## Output
          
          After the conversation, generate the complete VISION.md content.
          Write it to: {{project_path}}/docs/01-vision/VISION.md
          
          Use the template structure from the VISION_TEMPLATE but fill in with
          real content from the conversation. Remove template instructions and
          placeholder text.
          
          ```
          VISION DOCUMENT GENERATED
          =========================
          
          File: {{project_path}}/docs/01-vision/VISION.md
          
          Summary:
          - Problems: [brief list]
          - Audience: [primary audience]
          - V1 Focus: [one line]
          
          Ready for: Epic generation
          ```
        output: "vision_generated"
        timeout: 600

  # ==========================================================================
  # STAGE 4: EPIC GENERATION
  # Create the first V1 epic
  # ==========================================================================
  - name: "epic"
    steps:
      - id: "generate-epic"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        prompt: |
          Generate the first epic for {{project_name}}.
          
          ## Context
          - Project: {{project_name}}
          - Description: {{project_description}}
          - Vision: {{vision_generated}}
          
          ## Epic Generation
          
          Ask questions to understand the first epic:
          
          1. "What's the most important capability for V1?"
          2. "What user problem does this epic solve?"
          3. "What should users be able to DO when this epic is complete?"
          4. "What are the success criteria?"
          
          ## Epic Structure
          
          The epic should follow this format:
          
          ```markdown
          # Epic 01: [Epic Name]
          
          **Owner:** [To be assigned]
          
          ## 1. Summary
          [2-3 sentences: What, Why, Who benefits]
          
          ## 2. Problem
          [User problem this addresses]
          
          ## 3. Proposed Solution
          [What capability users will have - user terms, not technical]
          
          ## 4. User Stories
          
          ### Implemented
          (None yet - stories created when features are built)
          
          ### Future
          - [Capability 1]
          - [Capability 2]
          - [Capability 3]
          
          ## 5. Outcomes
          **Success Looks Like:**
          - [Measurable outcome]
          
          ## 6. Dependencies
          **Requires:** [Prerequisites]
          **Enables:** [What this makes possible]
          
          ## 7. Open Questions
          - [ ] [Question to resolve]
          ```
          
          ## Output
          
          Write the epic to: {{project_path}}/docs/02-requirements/epics/01-[epic-name].md
          
          Use kebab-case for the filename (e.g., 01-core-functionality.md).
          
          ```
          EPIC GENERATED
          ==============
          
          File: {{project_path}}/docs/02-requirements/epics/01-[name].md
          
          Epic: [Epic Name]
          Problem: [One line]
          Key Capabilities:
          - [Capability 1]
          - [Capability 2]
          
          Ready for: Navigation setup
          ```
        output: "epic_generated"
        timeout: 600

  # ==========================================================================
  # STAGE 5: NAVIGATION SETUP
  # Create docs/README.md with links to all documentation
  # ==========================================================================
  - name: "navigation"
    steps:
      - id: "create-readme"
        agent: "foundation:zen-architect"
        prompt: |
          Create the docs/README.md navigation file.
          
          ## Context
          - Project: {{project_name}}
          - Description: {{project_description}}
          - Tier: {{structure_tier}}
          - Structure: {{structure_created}}
          - Vision: {{vision_generated}}
          - Epic: {{epic_generated}}
          
          ## README Structure
          
          Create a navigation README that:
          
          1. **Introduces the documentation** - Brief project overview
          2. **Links to key documents** - Vision, Principles (if standard+), Epics
          3. **Shows epic status table** - Track what's implemented
          4. **Explains the structure** - Help newcomers navigate
          
          ## Template
          
          ```markdown
          # {{project_name}} Documentation
          
          {{project_description}}
          
          ---
          
          ## Quick Links
          
          | Document | Purpose |
          |----------|---------|
          | [VISION](01-vision/VISION.md) | Problems, positioning, roadmap |
          | [Epics](02-requirements/epics/) | What we're building |
          {% if structure_tier != 'lean' %}
          | [PRINCIPLES](01-vision/PRINCIPLES.md) | Decision framework |
          | [SUCCESS-METRICS](01-vision/SUCCESS-METRICS.md) | How we measure success |
          | [User Stories](02-requirements/user-stories/) | Implemented features |
          {% endif %}
          
          ---
          
          ## Epic Status
          
          | # | Epic | Status | Description |
          |---|------|--------|-------------|
          | 01 | [Epic Name](02-requirements/epics/01-name.md) | In Progress | Brief description |
          
          **Status Legend:** Planning | In Progress | Complete
          
          ---
          
          ## Documentation Structure
          
          ```
          docs/
            01-vision/          # Strategic direction
            02-requirements/    # What we're building
              epics/           # High-level features
              user-stories/    # Implemented capabilities
          ```
          
          ---
          
          ## Contributing
          
          - **Vision changes**: Rare, require broad alignment
          - **New epics**: Discuss in planning before creating
          - **User stories**: Created ONLY when implementing a feature
          - **Principles**: Evolve as we learn
          ```
          
          ## Output
          
          Write to: {{project_path}}/docs/README.md
          
          Customize based on the actual structure tier and generated content.
          
          ```
          NAVIGATION CREATED
          ==================
          
          File: {{project_path}}/docs/README.md
          
          Links to:
          - Vision: [path]
          - Epic: [path]
          - ... (list all linked docs)
          ```
        output: "readme_created"
        timeout: 300

      - id: "final-summary"
        agent: "foundation:zen-architect"
        prompt: |
          Provide a final summary of what was created.
          
          ## Created Items
          - Structure: {{structure_created}}
          - Vision: {{vision_generated}}
          - Epic: {{epic_generated}}
          - README: {{readme_created}}
          
          ## Final Summary
          
          Provide a clean summary for the user:
          
          ```
          DOC-DRIVEN SETUP COMPLETE
          =========================
          
          Project: {{project_name}}
          Location: {{project_path}}/docs/
          Tier: {{structure_tier}}
          
          Created:
          --------
          [List all files created with full paths]
          
          Next Steps:
          -----------
          1. Review VISION.md and refine the problems/positioning
          2. Add more epics as you plan features
          3. Create user stories ONLY when implementing features
          {% if structure_tier != 'lean' %}
          4. Fill in PRINCIPLES.md as you make design decisions
          5. Define SUCCESS-METRICS.md before measuring anything
          {% endif %}
          
          Quick Start:
          ------------
          cd {{project_path}}/docs
          cat README.md
          
          Happy building!
          ```
        output: "final_summary"
        timeout: 120

# ==========================================================================
# EXPECTED OUTPUTS
# ==========================================================================
#
# After full execution:
# - project_summary: Validated project information
# - structure_created: Directory structure and templates
# - vision_generated: Complete VISION.md
# - epic_generated: First V1 epic
# - readme_created: Navigation README
# - final_summary: Complete summary of what was created
#
# Files created (lean tier):
# - docs/README.md
# - docs/01-vision/VISION.md
# - docs/02-requirements/epics/README.md
# - docs/02-requirements/epics/01-[first-epic].md
# - docs/templates/VISION_TEMPLATE.md
# - docs/templates/EPIC_TEMPLATE.md
# - docs/templates/USER_STORY_TEMPLATE.md
#
# Additional files (standard tier):
# - docs/01-vision/PRINCIPLES.md
# - docs/01-vision/SUCCESS-METRICS.md
# - docs/02-requirements/user-stories/README.md
# - docs/templates/PRINCIPLES_TEMPLATE.md
# - docs/templates/SUCCESS_METRICS_TEMPLATE.md
#
# Additional directories (full tier):
# - docs/03-technical/
# - docs/04-guides/
# - docs/05-design/
# - docs/06-research/
# - docs/templates/ (all templates from workspaces2)
